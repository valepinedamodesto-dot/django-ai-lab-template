{% extends "tienda/base.html" %}
{% block title %}Crear producto{% endblock %}

{% block content %}
<h1>Crear producto</h1>
<form method="POST">
    {% csrf_token %}

    <!-- Renderizado rápido: cada campo envuelto en <p> con  labels y errores -->
    {{ form.as_p }}

    <button type="submit">Guardar</button>
</form>
<p><a href="{% url 'tienda:lista_productos' %}">Volver a la lista</a></p>
{% endblock %}
