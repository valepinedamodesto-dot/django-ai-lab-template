{% extends "tienda/base.html" %}

{% block title %}{{ producto.nombre }}{% endblock %}

{% block content %}

<h1>{{ producto.nombre }}</h1>
<p>{{ producto.descripcion }}</p>
<p><strong>Precio:</strong> ${{ producto.precio|floatformat:2 }}</p>





<p>
    <a href= " {% url 'tienda:editar_producto' producto.pk %}"class="btn primary">Editar Producto</a>
    <a href= " {% url 'tienda:eliminar_producto' producto.pk %}" class="btn delete">Eliminar Producto</a>
</p>

{% endblock %}
