{% extends "tienda/base.html" %}

{% block title %}Crear cliente{% endblock %}

{% block content %}

<h1>Crear cliente</h1>

<form method="POST">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="btn primary">
        Guardar
    </button>
</form>

<hr>

<p>
    <a href="{% url 'tienda:lista_clientes' %}">
        Volver a la lista
    </a>
</p>

{% endblock %}
